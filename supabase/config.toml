project_id = "skindesk"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
# Match the zod schema in src/schemas/auth.schema.ts so server-side validation
# rejects weak passwords even if the client is bypassed. These apply locally on
# `supabase start`. To sync them to the remote project, set them in
# Dashboard → Auth → Providers → Email (CLI `config push` would also clobber
# other keys here, so don't run it blindly). On the same Dashboard screen,
# also enable "Leaked password protection" — that one isn't pushable from
# config.toml at all.
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

[auth.email.template.invite]
subject = "Te invitaron a SkinDesk"

[auth.sms]
enable_signup = false

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true

[analytics]
enabled = false
